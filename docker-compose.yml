services:
  jav-search:
    build:
      context: .
      dockerfile: Dockerfile
    image: jav-search:latest
    container_name: jav-search
    restart: unless-stopped
    ports:
      - "8085:8085"               # 修改左侧端口以避免冲突
    volumes:
      # ── 配置持久化 ──
      # 默认用命名卷（Docker 自动管理，无需手动建目录）
      - jav-config:/config
      #
      # 如果你想把配置直接放到群晖某个文件夹里方便编辑，
      # 注释掉上面一行，改用下面的绑定挂载，并务必先手动建好该目录：
      #   mkdir -p /volume1/docker/jav-search/config
      # - /volume1/docker/jav-search/config:/config
      #
      # ── 媒体库刮削/发种目录映射（容器侧统一在 /data 下）──
      # 让容器能访问下载目录（刮削监控源/发种就地规整）与归档目录（给 EMBY 扫）。
      # 路径需与「设置 → 刮削 / 发种」里填写的容器内路径一致（即冒号右侧）。
      # 刮削目录建议与 qBittorrent 的保存目录指向同一份宿主机数据：
      # - /volume1/downloads/jav:/data/downloads       # 刮削目录：＝下载器保存目录/监控源（发种就地做种）
      # - /volume1/media/jav:/data/media               # 归档目录：刮削后归档（按 YYYYMM 建子目录）
    environment:
      - CONFIG_DIR=/config
      - PORT=8085
      - TZ=Asia/Shanghai
      # ── 登录认证 ──（在此设置网页登录的账号密码）
      - AUTH_USERNAME=admin
      - AUTH_PASSWORD=change_me_please
      - AUTH_SECRET=please-change-this-to-a-long-random-string
      - AUTH_SESSION_TTL=604800
      # ── 封面/图片磁盘缓存上限（MB）──
      # 图片经 /api/img 代理后落盘到 /config/imgcache：容器重启不丢、多用户/多实例共享、
      # 命中即零上游请求。超上限按最旧访问淘汰(LRU)。默认 500；设 0 关闭磁盘缓存（仅内存）。
      # - IMG_DISK_CACHE_MB=500
      # ── 新增数据源域名（AVSOX/AVMOO 域名常变，失效时改这里）──
      # - AVSOX_BASE=https://avsox.click
      # - AVMOO_BASE=https://avmoo.website
    # 若 Jackett / 代理跑在群晖宿主机上，用 host.docker.internal 访问宿主机
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8085/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  jav-config:

networks:
  default:
    name: jav-search-net
